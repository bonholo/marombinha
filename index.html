<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marombinha</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#0a0a0f;color:#fff;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:70px}
.screen{display:none;padding:16px;animation:fade .3s}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app"></div>
<script src="game.js"></script>
</body>
</html>
